<!DOCTYPE html>
<!-- saved from url=(0040)https://web-sandbox.oaiusercontent.com/? -->
<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2周年記念クイズ</title>
<style>
body{font-family:sans-serif;background:#ffeef5;margin:0;padding:20px}
.card{max-width:800px;margin:auto;background:#fff;padding:24px;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
h1{text-align:center}
#progress{font-weight:bold;margin-bottom:15px}
.choice{display:block;margin:10px 0;padding:12px;border:1px solid #ddd;border-radius:10px;cursor:pointer}
button{padding:12px 20px;border:none;border-radius:10px;cursor:pointer}
#videoArea{display:none}
video{width:100%;border-radius:12px}
</style>
<style>html,body,#root{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;margin:0;padding:0}html,body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Oxygen,Ubuntu,Cantarell,Helvetica Neue,Arial,sans-serif!important}button,input,textarea,select{font-family:inherit}html{background-color:#fff}html.dark{background-color:#212121}html.chatgptOled.dark,html.mobileSkybridge.dark{background-color:#000}@supports (font: -apple-system-body){html.mobileSkybridge{font:-apple-system-body}}html.desktopSkybridge.dark{background-color:#1e1e1e}html.androidSkybridge,html.androidSkybridge body,html.androidSkybridge *{-webkit-tap-highlight-color:rgba(255,255,255,0)}html.androidSkybridge *::selection,html.androidSkybridge *::-moz-selection{background:#fff0;color:inherit}</style></head>
<body>
<div class="card">
<h1>💕 2周年記念クイズ 💕</h1>
<div id="quizArea">
<div id="progress">1 / 25 問</div>
<h2 id="question">記念日はいつでしょう？</h2>
<div id="choices"><label class="choice"><input type="radio" name="ans" value="0" onchange="selected=0"> 2024/05/18</label><label class="choice"><input type="radio" name="ans" value="1" onchange="selected=1"> 2024/05/11</label><label class="choice"><input type="radio" name="ans" value="2" onchange="selected=2"> 2024/05/25</label></div>
<button onclick="nextQuestion()">次へ</button>
</div>

<div id="result"></div>

<div id="videoArea">
<h2>🎉全問正解おめでとう！🎉</h2>
<video id="rewardVideo" controls="" autoplay="">
<source src="My Movie.mp4" type="video/mp4">
</video>
<p id="endMsg" style="display:none;font-size:22px;">2年間ありがとう。これからもよろしくね💕</p>
</div>
</div>

<script>
const questions = [
{q:"記念日はいつでしょう？",c:["2024/05/18","2024/05/11","2024/05/25"],a:0},
{q:"彼氏の誕生日は？",c:["2002/02/26","2002/02/16","2002/03/26"],a:0},
{q:"初めて出会ったのは？",c:["喫煙所","食堂","研究室"],a:0},
{q:"一緒に食べた餃子は？",c:["丸満餃子","宇都宮みんみん","正嗣餃子"],a:0},
{q:"塩焼きを何匹食べた？",c:["4匹","2匹","6匹"],a:0},
{q:"花火大会はどこ？",c:["足利花火大会","古河花火大会","熊谷花火大会"],a:0},
{q:"買ったタオルの色は？",c:["黄色","青色","赤色"],a:0},
{q:"瑞巌寺で食べたものは？",c:["カツ丼","天丼","牛タン定食"],a:0},
{q:"先に行ったイルミネーションは？",c:["足利フラワーパーク","青の洞窟","東京ドイツ村"],a:0},
{q:"初詣での運勢は？",c:["末吉","小吉","吉"],a:0},
{q:"伊豆旅行のポーズは？",c:["ピグレット","ハートポーズ","ピース"],a:0},
{q:"盗もうとした絵画は？",c:["モナ・リザ","真珠の耳飾りの少女","叫び"],a:0},
{q:"指輪を作った場所は？",c:["glanta","ケイウノ","アイプリモ"],a:0},
{q:"IKEAで買ったものは？",c:["サメのタオル","サメのぬいぐるみ","クッション"],a:0},
{q:"買ったタオルのアーティストは？",c:["Chevon","Kroi","ヤングスキニー"],a:0},
{q:"迎えた植物は？",c:["ガジュマル","パキラ","モンステラ"],a:0},
{q:"被り物のキャラは？",c:["クロウハウザー","ニック","ジュディ"],a:0},
{q:"紅葉ライトアップの寺は？",c:["宝徳寺","鑁阿寺","永観堂"],a:0},
{q:"森で出会った生き物は？",c:["ムーミン","スナフキン","ニョロニョロ"],a:0},
{q:"ケーキに貼った果物は？",c:["いちご","キウイ","みかん"],a:0},
{q:"海のミルクは？",c:["牡蠣","ホタテ","はまぐり"],a:0},
{q:"夢の機械は？",c:["ニンテンドースイッチ2","Steam Deck","PlayStation 5"],a:0},
{q:"真似したアニメキャラは？",c:["碇ゲンドウ","綾波レイ","渚カヲル"],a:0},
{q:"奴隷にした畜生の種族は？",c:["コーギー","柴犬","ダックスフンド"],a:0},
{q:"これからも仲良くしてくれるかな？",c:["もちろん！","たぶん！","検討します！"],a:0}
];

let current=0,score=0,selected=-1;

function render(){
document.getElementById("progress").innerText=`${current+1} / ${questions.length} 問`;
document.getElementById("question").innerText=questions[current].q;
let html="";
questions[current].c.forEach((x,i)=>{
html+=`<label class="choice"><input type="radio" name="ans" value="${i}" onchange="selected=${i}"> ${x}</label>`;
});
document.getElementById("choices").innerHTML=html;
}

function nextQuestion(){
if(selected===-1){alert("選択してください");return;}
if(selected===questions[current].a) score++;
selected=-1;
current++;
if(current<questions.length){render();}
else finish();
}

function finish(){
let percent=Math.round(score/questions.length*100);
document.getElementById("quizArea").style.display="none";

if(percent===100){
document.getElementById("videoArea").style.display="block";
document.getElementById("rewardVideo").onended=()=>{
document.getElementById("endMsg").style.display="block";
};
}else{
document.getElementById("result").innerHTML=`
<h2>${percent}点</h2>
<p>もうちょっと頑張ってほしいな♡</p>
<button onclick="location.reload()">もう一回挑戦する</button>`;
}
}

render();
</script>

</body></html>
