<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>💕 2周年記念クイズ 💕</title>

<style>
body{
    font-family:sans-serif;
    background:#ffeef5;
    margin:0;
    padding:20px;
}

.card{
    max-width:800px;
    margin:auto;
    background:white;
    padding:24px;
    border-radius:16px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#ff4d88;
}

#progress{
    font-weight:bold;
    margin-bottom:15px;
}

.choice{
    display:block;
    margin:10px 0;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    cursor:pointer;
}

.choice:hover{
    background:#fff0f5;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#ff4d88;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

#videoArea{
    display:none;
}

video{
    width:100%;
    border-radius:12px;
}

#result{
    text-align:center;
}
</style>
</head>

<body>

<div class="card">
<div id="menuArea">

    <h2 style="text-align:center;">
        💕 2周年記念 💕
    </h2>

    <div style="text-align:center;">

        <button onclick="startQuiz()"
                style="margin:10px;width:250px;height:60px;">
            クイズを解く
        </button>

        <br>

        <button onclick="showOpeningVideo()"
                style="margin:10px;width:250px;height:60px;">
            動画を見る
        </button>

    </div>

</div>
<div id="openingArea"
     style="display:none;">

    <h2>💕 Opening Movie 💕</h2>

    <video id="openingVideo"
           controls
           autoplay>

        <source
            src="Opening.mp4"
            type="video/mp4">

    </video>

    <br><br>

    <button onclick="backToMenu()">
        メニューへ戻る
    </button>

</div>
<h1>💕 2周年記念クイズ 💕</h1>

<div id="quizArea" style="display: none;">

<div id="progress"></div>

<h2 id="question"></h2>

<div id="choices"></div>

<button onclick="nextQuestion()">
次へ
</button>

</div>

<div id="result"></div>

<div id="videoArea">

<h2>🎉全問正解おめでとう！🎉</h2>

<video id="rewardVideo" controls autoplay>
<source src="My Movie.mp4" type="video/mp4">
</video>

<p id="endMsg"
style="
display:none;
font-size:22px;
text-align:center;
">
2年間ありがとう。これからもよろしくね💕
</p>

</div>

</div>

<script>
const questions = [

{
q:"記念日はいつでしょう？",
c:["2024/05/18","2024/05/11","2024/05/25"],
a:0
},

{
q:"彼氏の誕生日は？",
c:["2002/02/26","2002/02/16","2002/03/26"],
a:0
},

{
q:"初めて出会ったのは？",
c:["喫煙所","食堂","研究室"],
a:0
},

{
q:"2024/05/18に一緒に食べた餃子は何でしょう？",
c:["丸満餃子","宇都宮みんみん","正嗣餃子"],
a:0
},

{
q:"塩焼きを何匹食べた？",
c:["4匹","2匹","6匹"],
a:0
},

{
q:"花火大会はどこ？",
c:["足利花火大会","古河花火大会","熊谷花火大会"],
a:0
},

{
q:"買ったタオルの色は？",
c:["黄色","青色","赤色"],
a:0
},

{
q:"瑞巌寺で食べたものは？",
c:["カツ丼","天丼","牛タン定食"],
a:0
},

{
q:"先に行ったイルミネーションは？",
c:["足利フラワーパーク","青の洞窟","東京ドイツ村"],
a:0
},

{
q:"初詣での運勢は？",
c:["末吉","小吉","吉"],
a:0
},

{
q:"伊豆旅行のツーショットのポーズは？",
c:["ピグレット","ハートポーズ","ピース"],
a:0
},

{
q:"盗もうとした絵画は？",
c:["モナ・リザ","真珠の耳飾りの少女","叫び"],
a:0
},

{
q:"指輪を作った場所は？",
c:["glanta","ケイウノ","アイプリモ"],
a:0
},

{
q:"IKEAで買ったものは？",
c:["サメのタオル","サメのぬいぐるみ","クッション"],
a:0
},

{
q:"買ったタオルのアーティストは？",
c:["Chevon","Kroi","ヤングスキニー"],
a:0
},

{
q:"迎えた植物は？",
c:["ガジュマル","パキラ","モンステラ"],
a:0
},

{
q:"被り物のキャラは？",
c:["クロウハウザー","ニック","ジュディ"],
a:0
},

{
q:"紅葉ライトアップの寺は？",
c:["宝徳寺","鑁阿寺","永観堂"],
a:0
},

{
q:"森で出会った生き物は？",
c:["ムーミン","スナフキン","ニョロニョロ"],
a:0
},

{
q:"ケーキに貼った果物は？",
c:["いちご","キウイ","みかん"],
a:0
},

{
q:"海のミルクと呼ばれる魚介は？",
c:["牡蠣","ホタテ","はまぐり"],
a:0
},

{
q:"夢の機械は？",
c:["ニンテンドースイッチ2","Steam Deck","PlayStation 5"],
a:0
},

{
q:"真似していたアニメキャラは？",
c:["碇ゲンドウ","綾波レイ","渚カヲル"],
a:0
},

{
q:"奴隷にした畜生の種族は？",
c:["コーギー","柴犬","ダックスフンド"],
a:0
},

{
q:"これからも仲良くしてくれるかな？",
c:["もちろん！","たぶん！","検討します！"],
a:0
}

];
let current = 0;
let score = 0;
let selected = -1;

function renderQuestion(){

    document.getElementById("progress").innerText =
        `${current + 1} / ${questions.length} 問`;

    document.getElementById("question").innerText =
        questions[current].q;

    let html = "";

    questions[current].c.forEach((choice,index)=>{

        html += `
        <label class="choice">
            <input
                type="radio"
                name="answer"
                value="${index}"
                onchange="selected=${index}"
            >
            ${choice}
        </label>
        `;
    });

    document.getElementById("choices").innerHTML = html;
}

function nextQuestion(){

    if(selected === -1){
        alert("選択肢を選んでください！");
        return;
    }

    if(selected === questions[current].a){
        score++;
    }

    selected = -1;
    current++;

    if(current < questions.length){
        renderQuestion();
    }
    else{
        finishQuiz();
    }
}

function finishQuiz(){

    const percent =
        Math.round(score / questions.length * 100);

    document.getElementById("quizArea").style.display = "none";

    if(percent === 100){

        document.getElementById("videoArea").style.display =
            "block";

        const video =
            document.getElementById("rewardVideo");

        video.play();

        video.onended = function(){

            document.getElementById("endMsg")
                .style.display = "block";

        };

    }
    else{

        document.getElementById("result").innerHTML = `
        <h2>${percent}点</h2>

        <p style="
            font-size:22px;
            color:#ff4d88;
        ">
        もうちょっと頑張ってほしいな♡
        </p>

        <button onclick="location.reload()">
            もう一回挑戦する
        </button>
        `;
    }
}
function startQuiz(){

    document.getElementById("menuArea")
        .style.display = "none";

    document.getElementById("quizArea")
        .style.display = "block";

    renderQuestion();
}

function showOpeningVideo(){

    document.getElementById("menuArea")
        .style.display = "none";

    document.getElementById("openingArea")
        .style.display = "block";

    document.getElementById("openingVideo")
        .play();
}

function backToMenu(){

    document.getElementById("openingArea")
        .style.display = "none";

    document.getElementById("menuArea")
        .style.display = "block";

    const video =
        document.getElementById("openingVideo");

    video.pause();
    video.currentTime = 0;
}

</script>

</body>
</html>
