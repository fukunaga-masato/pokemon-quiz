<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>💕 2周年記念クイズ 💕</title>

<style>
body{
    margin:0;
    padding:20px;
    min-height:100vh;

    background:
    linear-gradient(
        135deg,
        #111827,
        #1f2937
    );

    color:white;

    font-family:
    "Hiragino Sans",
    sans-serif;
}

.card{

    max-width:800px;
    margin:auto;

    background:
    rgba(255,255,255,0.05);

    backdrop-filter:blur(15px);

    border:
    1px solid rgba(255,255,255,0.1);

    border-radius:20px;

    padding:30px;

    box-shadow:
    0 8px 30px rgba(0,0,0,0.4);

}

h1{

    text-align:center;

    font-size:2rem;

    letter-spacing:2px;

    margin-bottom:30px;

}

.choice{

    display:block;

    padding:15px;

    margin:12px 0;

    border-radius:12px;

    background:
    rgba(255,255,255,0.08);

    transition:0.3s;
}

.choice:hover{

    transform:translateY(-2px);

    background:
    rgba(255,255,255,0.15);

}

button{

    background:
    linear-gradient(
        135deg,
        #ec4899,
        #8b5cf6
    );

    color:white;

    border:none;

    border-radius:12px;

    padding:14px 24px;

    cursor:pointer;

    font-size:16px;

    margin-top:15px;
}

</style>
</head>

<body>

<div class="card">
<div id="menuArea">

    <h2 style="text-align:center;">
        💕 2周年記念 💕
    </h2>

    <div style="text-align:center;">

        <button onclick="startQuiz()"
                style="margin:10px;width:250px;height:60px;">
            クイズを解く
        </button>

        <br>

        <button onclick="showOpeningVideo()"
                style="margin:10px;width:250px;height:60px;">
            動画を見る
        </button>

    </div>

</div>
<div id="openingArea"
     style="display:none;">

    <h2>💕 Opening Movie 💕</h2>

    <video id="openingVideo"
           controls
           autoplay>

        <source
            src="Opening.mp4"
            type="video/mp4">

    </video>

    <br><br>

    <button onclick="backToMenu()">
        メニューへ戻る
    </button>

</div>
<h1>💕 2周年記念クイズ 💕</h1>

<div id="quizArea" style="display: none;">

<div id="progress"></div>

<h2 id="question"></h2>

<div id="choices"></div>

<button onclick="nextQuestion()">
次へ
</button>

</div>

<div id="result"></div>

<div id="videoArea" style="display:none;">

    <h2 id="videoTitle"></h2>

    <video id="rewardVideo" controls autoplay>
        <source src="" type="video/mp4">
    </video>

    <div id="actionArea" style="display:none;margin-top:20px;">

        <button
            id="retryBtn"
            onclick="location.reload()"
            style="display:none;"
        >
            最初の画面に戻る
        </button>

        <button
            id="endingBtn"
            onclick="playEnding()"
            style="display:none;"
        >
            エンディングへ進む
        </button>

    </div>

</div>
</div>

</div>

<script>
const questions = [



{
q:"これからも仲良くしてくれるかな？",
c:["もちろん！","いや、どうかな","ちょっと持ち帰らせていただきます"],
a:0
}

];
let current = 0;
let score = 0;
let selected = -1;
function playEnding(){

    const title =
        document.getElementById("videoTitle");

    const video =
        document.getElementById("rewardVideo");

    const source =
        video.querySelector("source");

    document.getElementById("actionArea")
        .style.display = "none";

    title.innerText =
        "💕 2年間ありがとう 💕";

    source.src = "Ending.mp4";

    video.load();

    video.play();

    video.onended = function(){

        title.innerHTML=
        `
        <h1>
        2年間ありがとう💕
        </h1>

        <p>
        これからも
        よろしくね
        </p>
        `;

    };

}
function renderQuestion(){

    document.getElementById("progress").innerText =
        `${current + 1} / ${questions.length} 問`;

    document.getElementById("question").innerText =
        questions[current].q;

    let html = "";

    questions[current].c.forEach((choice,index)=>{

        html += `
        <label class="choice">
            <input
                type="radio"
                name="answer"
                value="${index}"
                onchange="selected=${index}"
            >
            ${choice}
        </label>
        `;
    });

    document.getElementById("choices").innerHTML = html;
}

function nextQuestion(){

    if(selected === -1){
        alert("選択肢を選んでください！");
        return;
    }

    if(selected === questions[current].a){
        score++;
    }

    selected = -1;
    current++;

    if(current < questions.length){
        renderQuestion();
    }
    else{
        finishQuiz();
    }
}

function finishQuiz(){

    const percent =
        Math.round(score / questions.length * 100);

    document.getElementById("quizArea").style.display = "none";
    document.getElementById("videoArea").style.display = "block";

    const video =
        document.getElementById("rewardVideo");

    const source =
        video.querySelector("source");

    const title =
        document.getElementById("videoTitle");

    const retryBtn =
        document.getElementById("retryBtn");

    const endingBtn =
        document.getElementById("endingBtn");

    const actionArea =
        document.getElementById("actionArea");

    if(percent === 100){

        title.innerText =
            "🎉 全問正解おめでとう！ 🎉";

        source.src = "collect.mp4";

        video.load();

        video.onended = function(){

            launchCelebration();

            title.innerHTML =
            `
            <h2>
            💯 100点！
            </h2>

            <p>
            全問正解おめでとう💕
            </p>
            `;

            actionArea.style.display =
            "block";

            endingBtn.style.display =
            "inline-block";

        };

    }
    else{

        title.innerText =
            `${percent}点\nもうちょっと頑張ってほしいな♡`;

        source.src = "nop.mp4";

        video.load();

        video.onended = function(){

            title.innerHTML =
            `
            <h2>
            ${percent}点
            </h2>

            <p>
            もうちょっと
            頑張ってほしいな♡
            </p>
            `;

            actionArea.style.display =
            "block";

            retryBtn.style.display =
            "inline-block";

        };

    }

    video.play();
}
function startQuiz(){

    document.getElementById("menuArea")
        .style.display = "none";

    document.getElementById("quizArea")
        .style.display = "block";

    renderQuestion();
}

function showOpeningVideo(){

    document.getElementById("menuArea")
        .style.display = "none";

    document.getElementById("openingArea")
        .style.display = "block";

    document.getElementById("openingVideo")
        .play();
}

function backToMenu(){

    document.getElementById("openingArea")
        .style.display = "none";

    document.getElementById("menuArea")
        .style.display = "block";

    const video =
        document.getElementById("openingVideo");

    video.pause();
    video.currentTime = 0;
}
function launchCelebration(){

    const canvas =
    document.getElementById(
        "confettiCanvas"
    );

    const ctx =
    canvas.getContext("2d");

    canvas.width =
    window.innerWidth;

    canvas.height =
    window.innerHeight;

    const particles=[];

    for(let i=0;i<250;i++){

        particles.push({

            x:
            Math.random()*canvas.width,

            y:
            Math.random()*canvas.height,

            r:
            Math.random()*6+4,

            vx:
            Math.random()*4-2,

            vy:
            Math.random()*4+1

        });

    }

    function animate(){

        ctx.clearRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        particles.forEach(p=>{

            ctx.fillStyle =
            Math.random()>0.5
            ? "#ff4da6"
            : "#ffd700";

            ctx.beginPath();

            ctx.arc(
                p.x,
                p.y,
                p.r,
                0,
                Math.PI*2
            );

            ctx.fill();

            p.y += p.vy;
            p.x += p.vx;

        });

        requestAnimationFrame(
            animate
        );
    }

    animate();

}
</script>
<canvas
id="confettiCanvas"
style="
position:fixed;
top:0;
left:0;
pointer-events:none;
z-index:999;
">
</canvas>
</body>
</html>
